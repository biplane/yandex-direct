name: "CI"

on: [push, pull_request]

jobs:
  coding-standards:
    name: "Check Coding Standards"

    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "none"
          php-version: "8.3"
          tools: composer:v2

      - name: "Install dependencies"
        uses: "ramsey/composer-install@v4"
        with:
          dependency-versions: "highest"

      - name: "Run phpcs"
        run: vendor/bin/phpcs -n

  static-analysis:
    name: "Static Analysis"

    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "none"
          php-version: "8.3"
          tools: composer:v2

      - name: "Install dependencies"
        uses: "ramsey/composer-install@v4"
        with:
          dependency-versions: "highest"

      - name: "Run psalm"
        run: vendor/bin/psalm --no-progress

  tests:
    name: "PHPUnit tests"

    runs-on: ubuntu-latest

    strategy:
      matrix:
        dependencies:
          - "highest"
        php-version:
          - "8.3"
          - "8.4"
          - "8.5"
        include:
          - php-version: "8.3"
            dependencies: "lowest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer:v2
          ini-file: 'development'

      - name: "Install dependencies"
        uses: "ramsey/composer-install@v4"
        with:
          dependency-versions: "${{ matrix.dependencies }}"

      - name: "Run tests"
        run: vendor/bin/phpunit
